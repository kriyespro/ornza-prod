# ORNZA — host nginx vhost (install on VPS, NOT inside Docker)
# Cloudflare handles SSL termination → origin is HTTP only.
# Flow: Cloudflare (https) → host nginx :80 → Docker nginx :8080 → Django :8000
#
# INSTALL:
#   cd ~/ornza-prod
#   sudo cp deploy/host-nginx-ornza.conf /etc/nginx/sites-available/ornza
#   sudo ln -sf /etc/nginx/sites-available/ornza /etc/nginx/sites-enabled/ornza
#   sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT: Only ONE config should have server_name ornza.com www.ornza.com
#   sudo grep -r "ornza.com" /etc/nginx/sites-enabled/
# Remove ornza.com from krizn.conf / suratpro.conf / propsurat.conf if duplicated.
#
# Cloudflare SSL/TLS mode: set to "Flexible" (Cloudflare → origin = HTTP)

upstream ornza_docker {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name ornza.com www.ornza.com;

    client_max_body_size 25M;

    location / {
        proxy_pass http://ornza_docker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare always serves HTTPS to visitors even though origin is HTTP
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
