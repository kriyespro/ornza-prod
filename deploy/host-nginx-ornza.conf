# ORNZA — host nginx vhost (install on VPS, NOT inside Docker)
# Proxies https://ornza.com → Docker on 127.0.0.1:8080
#
# INSTALL:
#   cd ~/ornza-prod
#   sudo cp deploy/host-nginx-ornza.conf /etc/nginx/sites-available/ornza
#   # Edit SSL paths below to match your server (copy from old ornza file if needed)
#   sudo ln -sf /etc/nginx/sites-available/ornza /etc/nginx/sites-enabled/ornza
#   sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT: Only ONE config should have server_name ornza.com www.ornza.com
#   sudo grep -r "ornza.com" /etc/nginx/sites-enabled/
# Remove ornza.com from krizn.conf / suratpro.conf / propsurat.conf if duplicated.

upstream ornza_docker {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name ornza.com www.ornza.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ornza.com www.ornza.com;

    # >>> EDIT: paste your real cert paths (from old ornza vhost or certbot) <<<
    ssl_certificate     /etc/letsencrypt/live/ornza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ornza.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    location / {
        proxy_pass http://ornza_docker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
