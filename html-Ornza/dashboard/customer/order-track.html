<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracker · ORNZA Customer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="../../ornza-stack.js"></script>

  <link rel="stylesheet" href="../dashboard.css">
</head>
<body class="portal">
  <div class="portal-shell">
    <aside class="portal-sidebar" id="customer-sidebar" data-page="order-track"></aside>
    <div class="portal-sidebar-overlay"></div>
    <main class="portal-main">
      <header class="portal-topbar">
        <button class="portal-topbar-toggle" aria-label="Toggle menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="portal-topbar-title">Order Tracker</h1>
        <div class="portal-topbar-spacer"></div>
        <a href="orders.html" class="portal-btn portal-btn-outline portal-btn-sm">← My Orders</a>
      </header>
      <div class="portal-content">
        <div class="portal-card" style="margin-bottom:24px;">
          <div class="portal-card-header">
            <h2 class="portal-card-title">Order <span id="track-page-id">—</span></h2>
            <div style="display:flex;gap:8px;">
              <span id="track-page-status"></span>
              <span id="track-page-payment"></span>
            </div>
          </div>
          <div class="portal-card-body">
            <div class="portal-payment-row">
              <div>
                <div class="portal-payment-row-label">Delivery ETA</div>
                <div id="track-page-eta" style="font-weight:600;margin-top:4px;">—</div>
              </div>
              <div>
                <div class="portal-payment-row-label">Courier</div>
                <div id="track-page-courier" style="font-size:13px;margin-top:4px;color:var(--portal-text-muted);">—</div>
              </div>
              <div>
                <div class="portal-payment-row-label">Payment</div>
                <div id="track-page-method" style="font-size:13px;margin-top:4px;">—</div>
              </div>
            </div>
            <div class="portal-timeline" id="track-page-timeline"></div>
          </div>
        </div>
        <div class="portal-card">
          <div class="portal-card-header"><h2 class="portal-card-title">Items in this Order</h2></div>
          <div class="portal-card-body" id="track-page-items"></div>
        </div>
        <p style="text-align:center;margin-top:24px;font-size:12px;color:var(--portal-text-muted);">
          Track another order? <a href="../../track-order.html" style="color:var(--portal-gold-deep);font-weight:600;">Public order tracker →</a>
        </p>
      </div>
    </main>
  </div>
  <script src="../../orders-data.js"></script>
  <script src="customer-orders.js"></script>
  <script src="customer-nav.js"></script>
    <script src="../../portal-enhance.js"></script>
<script src="../dashboard.js"></script>
  <script src="../../ornza-enhance.js"></script>
</body>
</html>
