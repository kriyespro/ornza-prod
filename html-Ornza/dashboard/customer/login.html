<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login · ORNZA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="../../ornza-stack.js"></script>

  <link rel="stylesheet" href="../dashboard.css">
</head>
<body class="portal">
  <div class="portal-login-page">
    <div class="portal-login-card">
      <div class="portal-login-logo">ORN<span>Z</span>A</div>
      <p class="portal-login-subtitle">Customer Account</p>

      <form class="portal-form-demo" action="index.html">
        <div class="portal-form-group">
          <label class="portal-form-label" for="email">Email Address</label>
          <input class="portal-form-input" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="portal-form-group">
          <label class="portal-form-label" for="password">Password</label>
          <input class="portal-form-input" type="password" id="password" placeholder="••••••••" required>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--portal-text-muted);cursor:pointer;">
            <input type="checkbox"> Remember me
          </label>
          <a href="../../contact.html" style="font-size:12px;color:var(--portal-gold-deep);">Forgot password?</a>
        </div>
        <button type="submit" class="portal-btn portal-btn-primary" style="width:100%;justify-content:center;">Sign In</button>
      </form>

      <div class="portal-login-divider">or</div>

      <p style="text-align:center;font-size:13px;color:var(--portal-text-muted);">
        New to ORNZA? <a href="register.html" style="color:var(--portal-gold-deep);font-weight:600;">Create an account</a>
      </p>

      <p style="text-align:center;margin-top:24px;">
        <a href="../../index.html" style="font-size:12px;color:var(--portal-text-muted);">← Back to Store</a>
      </p>
    </div>
  </div>
    <script src="../../portal-enhance.js"></script>
<script src="../dashboard.js"></script>
  <script src="../../ornza-enhance.js"></script>
</body>
</html>
