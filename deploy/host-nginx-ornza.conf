# Install on the HOST server (not inside Docker).
# Proxies ornza.com → Docker nginx on port 8080.
#
#   sudo cp deploy/host-nginx-ornza.conf /etc/nginx/sites-available/ornza
#   sudo ln -sf /etc/nginx/sites-available/ornza /etc/nginx/sites-enabled/ornza
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare: DNS A record @ and www → 159.195.52.197 (proxied orange cloud OK)
# SSL mode: Full or Full (strict) if you add origin certs below.

upstream ornza_docker {
    server 127.0.0.1:8080;
    keepalive 8;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ornza.com www.ornza.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → Docker (port 8080)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ornza.com www.ornza.com;

    # Use your cert paths (certbot example):
    # ssl_certificate     /etc/letsencrypt/live/ornza.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ornza.com/privkey.pem;
    #
    # Or Cloudflare origin cert:
    # ssl_certificate     /etc/ssl/cloudflare/ornza.com.pem;
    # ssl_certificate_key /etc/ssl/cloudflare/ornza.com.key;

  client_max_body_size 25M;

    location / {
        proxy_pass http://ornza_docker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
