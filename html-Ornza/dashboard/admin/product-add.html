<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product · ORNZA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="../../ornza-stack.js"></script>

  <link rel="stylesheet" href="../dashboard.css">
</head>
<body class="portal">
  <div class="portal-shell">
    <aside class="portal-sidebar admin-sidebar" id="admin-sidebar" data-page="product-add"></aside>
    <div class="portal-sidebar-overlay"></div>
    <main class="portal-main">
      <header class="portal-topbar">
        <button class="portal-topbar-toggle" aria-label="Toggle menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="portal-topbar-title">Add Product</h1>
        <div class="portal-topbar-spacer"></div>
        <a href="products.html" class="portal-btn portal-btn-outline portal-btn-sm">← Back to Products</a>
      </header>
      <div class="portal-content">
        <div class="portal-grid-2">
          <div class="portal-card">
            <div class="portal-card-header"><h2 class="portal-card-title">Product Details</h2></div>
            <div class="portal-card-body">
              <form class="portal-form-demo">
                <div class="portal-form-group">
                  <label class="portal-form-label">Product Name</label>
                  <input class="portal-form-input" type="text" placeholder="e.g. Aurora Drop Earrings" required>
                </div>
                <div class="portal-form-row">
                  <div class="portal-form-group">
                    <label class="portal-form-label">SKU</label>
                    <input class="portal-form-input" type="text" placeholder="ORN-EAR-001">
                  </div>
                  <div class="portal-form-group">
                    <label class="portal-form-label">Price (₹)</label>
                    <input class="portal-form-input" type="number" placeholder="1799">
                  </div>
                </div>
                <div class="portal-form-row">
                  <div class="portal-form-group">
                    <label class="portal-form-label">Category</label>
                    <select class="portal-form-select">
                      <option>Earrings</option><option>Necklaces</option><option>Rings</option>
                      <option>Bracelets</option><option>Bangles</option><option>Mangalsutras</option>
                      <option>Men's</option><option>925 Silver</option><option>Hampers</option>
                    </select>
                  </div>
                  <div class="portal-form-group">
                    <label class="portal-form-label">Stock Quantity</label>
                    <input class="portal-form-input" type="number" placeholder="50">
                  </div>
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Description</label>
                  <textarea class="portal-form-textarea" placeholder="Gold plated · CZ crystals · Hypoallergenic…"></textarea>
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Status</label>
                  <select class="portal-form-select">
                    <option>Active</option><option>Draft</option><option>Out of Stock</option>
                  </select>
                </div>
                <button type="submit" class="portal-btn portal-btn-primary">Publish Product</button>
              </form>
            </div>
          </div>
          <div class="portal-card">
            <div class="portal-card-header"><h2 class="portal-card-title">Product Image</h2></div>
            <div class="portal-card-body">
              <div style="border:2px dashed var(--portal-border);border-radius:12px;padding:48px 24px;text-align:center;margin-bottom:20px;">
                <div class="portal-empty-icon" style="margin:0 auto 16px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
                <p style="font-size:13px;color:var(--portal-text-muted);margin-bottom:12px;">Drag & drop or click to upload</p>
                <button type="button" class="portal-btn portal-btn-outline portal-btn-sm">Choose Image</button>
              </div>
              <div class="portal-form-group">
                <label class="portal-form-label">Or Image URL</label>
                <input class="portal-form-input" type="text" placeholder="images/earrings.png">
              </div>
              <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                <input type="checkbox" checked> Featured on homepage
              </label>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="admin-nav.js"></script>
    <script src="../../portal-enhance.js"></script>
<script src="../dashboard.js"></script>
  <script src="../../ornza-enhance.js"></script>
</body>
</html>
