<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail · ORNZA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="../../ornza-stack.js"></script>

  <link rel="stylesheet" href="../dashboard.css">
</head>
<body class="portal">
  <div class="portal-shell">
    <aside class="portal-sidebar admin-sidebar" id="admin-sidebar" data-page="orders"></aside>
    <div class="portal-sidebar-overlay"></div>
    <main class="portal-main">
      <header class="portal-topbar">
        <button class="portal-topbar-toggle" aria-label="Toggle menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="portal-topbar-title">Order <span id="detail-order-id">—</span></h1>
        <div class="portal-topbar-spacer"></div>
        <a href="orders.html" class="portal-btn portal-btn-outline portal-btn-sm">← All Orders</a>
      </header>
      <div class="portal-content">
        <div id="order-detail-missing" class="portal-empty hidden">
          <h3>Order not found</h3>
          <a href="orders.html" class="portal-btn portal-btn-primary portal-btn-sm">Back to Orders</a>
        </div>

        <div class="portal-grid-3-1">
          <div>
            <div class="portal-card" style="margin-bottom:24px;">
              <div class="portal-card-header">
                <h2 class="portal-card-title">Order &amp; Payment Status</h2>
                <div style="display:flex;gap:8px;">
                  <span id="detail-status-display"></span>
                  <span id="detail-payment-display"></span>
                </div>
              </div>
              <div class="portal-card-body">
                <div class="portal-timeline" id="detail-timeline"></div>
                <div class="portal-table-wrap" style="margin-top:20px;">
                  <table class="portal-table">
                    <thead><tr><th>Product</th><th>Qty</th><th>Price</th></tr></thead>
                    <tbody id="detail-items-tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:24px;">
            <div class="portal-card">
              <div class="portal-card-header"><h2 class="portal-card-title">Customer</h2></div>
              <div class="portal-card-body" style="font-size:13px;line-height:1.8;">
                <div><strong id="detail-customer">—</strong></div>
                <div id="detail-email" style="color:var(--portal-text-muted);">—</div>
                <div id="detail-phone">—</div>
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--portal-border);">
                  <div class="portal-payment-row-label">Delivery Address</div>
                  <div id="detail-address" style="margin-top:6px;color:var(--portal-text-muted);">—</div>
                </div>
              </div>
            </div>

            <div class="portal-card">
              <div class="portal-card-header"><h2 class="portal-card-title">Update Status</h2></div>
              <div class="portal-card-body">
                <div class="portal-form-group">
                  <label class="portal-form-label">Order Status</label>
                  <select class="portal-form-select" id="detail-order-status">
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="processing">Processing</option>
                    <option value="packed">Packed</option>
                    <option value="shipped">Shipped</option>
                    <option value="out_for_delivery">Out for Delivery</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="returned">Returned</option>
                  </select>
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Payment Method</label>
                  <select class="portal-form-select" id="detail-payment-method">
                    <option>UPI</option><option>Card</option><option>COD</option><option>WhatsApp</option>
                  </select>
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Payment Status</label>
                  <select class="portal-form-select" id="detail-payment-status">
                    <option value="pending">Payment Pending</option>
                    <option value="paid">Paid</option>
                    <option value="cod_pending">COD — On Delivery</option>
                    <option value="cod_collected">COD Collected</option>
                    <option value="failed">Payment Failed</option>
                    <option value="refunded">Refunded</option>
                  </select>
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Transaction ID</label>
                  <input class="portal-form-input" type="text" id="detail-txn" placeholder="UPI / Card reference">
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Courier</label>
                  <input class="portal-form-input" type="text" id="detail-courier" placeholder="Delhivery, BlueDart…">
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Tracking ID</label>
                  <input class="portal-form-input" type="text" id="detail-tracking">
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">ETA (YYYY-MM-DD)</label>
                  <input class="portal-form-input" type="date" id="detail-eta">
                </div>
                <p style="font-size:12px;color:var(--portal-text-muted);margin-bottom:16px;">Order date: <span id="detail-date">—</span> · Total: <strong id="detail-total">—</strong></p>
                <button type="button" class="portal-btn portal-btn-primary" id="save-order-btn" style="width:100%;justify-content:center;">Save Changes</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../../orders-data.js"></script>
  <script src="admin-nav.js"></script>
  <script src="admin-orders.js"></script>
    <script src="../../portal-enhance.js"></script>
<script src="../dashboard.js"></script>
  <script src="../../ornza-enhance.js"></script>
</body>
</html>
