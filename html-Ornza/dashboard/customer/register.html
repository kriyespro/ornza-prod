<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account · ORNZA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="../../ornza-stack.js"></script>

  <link rel="stylesheet" href="../dashboard.css">
</head>
<body class="portal">
  <div class="portal-login-page">
    <div class="portal-login-card">
      <div class="portal-login-logo">ORN<span>Z</span>A</div>
      <p class="portal-login-subtitle">Create Account</p>
      <form class="portal-form-demo" action="index.html">
        <div class="portal-form-row">
          <div class="portal-form-group">
            <label class="portal-form-label">First Name</label>
            <input class="portal-form-input" type="text" required>
          </div>
          <div class="portal-form-group">
            <label class="portal-form-label">Last Name</label>
            <input class="portal-form-input" type="text" required>
          </div>
        </div>
        <div class="portal-form-group">
          <label class="portal-form-label">Email</label>
          <input class="portal-form-input" type="email" required>
        </div>
        <div class="portal-form-group">
          <label class="portal-form-label">Phone</label>
          <input class="portal-form-input" type="tel" placeholder="+91" required>
        </div>
        <div class="portal-form-group">
          <label class="portal-form-label">Password</label>
          <input class="portal-form-input" type="password" required>
        </div>
        <button type="submit" class="portal-btn portal-btn-primary" style="width:100%;justify-content:center;">Create Account</button>
      </form>
      <p style="text-align:center;margin-top:24px;font-size:13px;color:var(--portal-text-muted);">
        Already have an account? <a href="login.html" style="color:var(--portal-gold-deep);font-weight:600;">Sign in</a>
      </p>
      <p style="text-align:center;margin-top:16px;">
        <a href="../../index.html" style="font-size:12px;color:var(--portal-text-muted);">← Back to Store</a>
      </p>
    </div>
  </div>
    <script src="../../portal-enhance.js"></script>
<script src="../dashboard.js"></script>
  <script src="../../ornza-enhance.js"></script>
</body>
</html>
