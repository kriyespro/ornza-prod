<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile & Settings · ORNZA Customer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="../../ornza-stack.js"></script>

  <link rel="stylesheet" href="../dashboard.css">
</head>
<body class="portal">
  <div class="portal-shell">
    <aside class="portal-sidebar" id="customer-sidebar" data-page="profile"></aside>

    <div class="portal-sidebar-overlay"></div>

    <main class="portal-main">
      <header class="portal-topbar">
        <button class="portal-topbar-toggle" aria-label="Toggle menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="portal-topbar-title">Profile &amp; Settings</h1>
        <div class="portal-topbar-spacer"></div>
        <a href="login.html" class="portal-btn portal-btn-ghost portal-btn-sm">Sign Out</a>
      </header>

      <div class="portal-content">
        <div class="portal-grid-2">
          <div class="portal-card">
            <div class="portal-card-header">
              <h2 class="portal-card-title">Personal Information</h2>
            </div>
            <div class="portal-card-body">
              <form class="portal-form-demo">
                <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;">
                  <div class="portal-user-avatar" style="width:64px;height:64px;font-size:22px;">PS</div>
                  <div>
                    <button type="button" class="portal-btn portal-btn-outline portal-btn-sm">Change Photo</button>
                    <p class="portal-form-hint">JPG or PNG, max 2MB</p>
                  </div>
                </div>
                <div class="portal-form-row">
                  <div class="portal-form-group">
                    <label class="portal-form-label">First Name</label>
                    <input class="portal-form-input" type="text" value="Priya">
                  </div>
                  <div class="portal-form-group">
                    <label class="portal-form-label">Last Name</label>
                    <input class="portal-form-input" type="text" value="Sharma">
                  </div>
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Email</label>
                  <input class="portal-form-input" type="email" value="priya.sharma@email.com">
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Phone</label>
                  <input class="portal-form-input" type="tel" value="+91 98765 43210">
                </div>
                <div class="portal-form-group">
                  <label class="portal-form-label">Date of Birth</label>
                  <input class="portal-form-input" type="date" value="1995-08-14">
                </div>
                <button type="submit" class="portal-btn portal-btn-primary">Save Changes</button>
              </form>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:24px;">
            <div class="portal-card">
              <div class="portal-card-header">
                <h2 class="portal-card-title">Change Password</h2>
              </div>
              <div class="portal-card-body">
                <form class="portal-form-demo">
                  <div class="portal-form-group">
                    <label class="portal-form-label">Current Password</label>
                    <input class="portal-form-input" type="password" placeholder="••••••••">
                  </div>
                  <div class="portal-form-group">
                    <label class="portal-form-label">New Password</label>
                    <input class="portal-form-input" type="password" placeholder="••••••••">
                  </div>
                  <div class="portal-form-group">
                    <label class="portal-form-label">Confirm Password</label>
                    <input class="portal-form-input" type="password" placeholder="••••••••">
                  </div>
                  <button type="submit" class="portal-btn portal-btn-outline">Update Password</button>
                </form>
              </div>
            </div>

            <div class="portal-card">
              <div class="portal-card-header">
                <h2 class="portal-card-title">Notifications</h2>
              </div>
              <div class="portal-card-body">
                <label style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--portal-border);cursor:pointer;">
                  <span style="font-size:13px;">Order updates via email</span>
                  <input type="checkbox" checked>
                </label>
                <label style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--portal-border);cursor:pointer;">
                  <span style="font-size:13px;">SMS delivery alerts</span>
                  <input type="checkbox" checked>
                </label>
                <label style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--portal-border);cursor:pointer;">
                  <span style="font-size:13px;">New collection launches</span>
                  <input type="checkbox" checked>
                </label>
                <label style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;cursor:pointer;">
                  <span style="font-size:13px;">Promotional offers</span>
                  <input type="checkbox">
                </label>
              </div>
            </div>

            <div class="portal-card">
              <div class="portal-card-header">
                <h2 class="portal-card-title">Membership</h2>
              </div>
              <div class="portal-card-body">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                  <span class="portal-status active">Gold Member</span>
                  <span style="font-size:12px;color:var(--portal-text-muted);">Since Jan 2025</span>
                </div>
                <p style="font-size:13px;color:var(--portal-text-muted);margin-bottom:12px;">480 reward points · ₹48 redeemable</p>
                <div style="height:6px;background:var(--portal-bg-alt);border-radius:3px;overflow:hidden;">
                  <div style="width:68%;height:100%;background:linear-gradient(90deg,var(--portal-gold-lt),var(--portal-gold));border-radius:3px;"></div>
                </div>
                <p style="font-size:11px;color:var(--portal-text-muted);margin-top:8px;">220 points to Platinum tier</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="customer-nav.js"></script>
    <script src="../../portal-enhance.js"></script>
<script src="../dashboard.js"></script>
  <script src="../../ornza-enhance.js"></script>
</body>
</html>
